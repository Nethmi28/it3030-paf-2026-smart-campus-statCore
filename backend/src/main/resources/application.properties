spring.config.import=optional:file:.env[.properties]

spring.application.name=facilio-campus

# ===============================
# DATABASE CONFIGURATION (NEON)
# ===============================
# We are using an environment variable DB_URL so you don't commit your password to GitHub!
# The default fallback (after the colon) is a placeholder. 
# You should set the DB_URL variable on your machine.
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-wild-haze-amo5ueoo.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_Ovnp5HC0ZJtK}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
# 'update' automatically builds your database tables based on your Java code
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the terminal for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Web server (locked to 8089 for local dev)
server.port=8089

# ===============================
# SECURITY / CORS
# ===============================
# Comma separated list of web origins allowed to call the API.
app.security.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}

# Temporary dev helper to create seed users; keep disabled unless you explicitly need it.
app.auth.enable-test-user=${APP_ENABLE_TEST_USER:false}

# Optional Google OAuth 2.0 login
app.oauth2.google.enabled=${APP_OAUTH2_GOOGLE_ENABLED:false}
app.oauth2.frontend-success-url=${APP_OAUTH2_FRONTEND_SUCCESS_URL:http://localhost:5173/login}
app.oauth2.frontend-failure-url=${APP_OAUTH2_FRONTEND_FAILURE_URL:http://localhost:5173/login}
app.oauth2.code-ttl-seconds=${APP_OAUTH2_CODE_TTL_SECONDS:120}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

jwt.secret=${JWT_SECRET:facilio-campus-dev-secret-change-me-before-production-2026}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}
