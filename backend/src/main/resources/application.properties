spring.config.import=optional:file:.env[.properties]

spring.application.name=facilio-campus

# ===============================
# DATABASE CONFIGURATION (NEON)
# ===============================
# We are using an environment variable DB_URL so you don't commit your password to GitHub!
# The default fallback (after the colon) is a placeholder. 
# You should set the DB_URL variable on your machine.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
# 'update' automatically builds your database tables based on your Java code
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the terminal for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Web server (locked to 8089 for local dev)
server.port=8089

# ===============================
# SECURITY / CORS
# ===============================
# Comma separated list of web origins allowed to call the API.
app.security.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Temporary dev helper to create a seed user; set to false in prod.
app.auth.enable-test-user=${APP_ENABLE_TEST_USER:true}

server.port=8089
